name: Build & Release

on:
  workflow_dispatch:               # manual trigger
  push:
    branches:
      - 'release/*'                # any branch under release/

jobs:
  build_unix:
    name: Build unix binary with PyInstaller
    runs-on: ubuntu-latest
    permissions:
      contents: write              # needed for creating a release / uploading assets

    steps:
      #--- Checkout source ----------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      #--- Set up Python -------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"   # adjust to the version you need
          cache: 'pip'             # Optional: speeds up dependency installation

      #--- Install build dependencies -------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          # Critical: Install your project's dependencies
          pip install -r requirements.txt

      #--- Build the executable -------------------------------------------------
      - name: Build package
        run: |
          # Note: If your shadow_chat.spec file is properly configured, 
          # you can replace the below command with just `pyinstaller shadow_chat.spec`
          pyinstaller \
            --onefile \
            --distpath dist-linux \
            --workpath build-linux \
            --add-data "assets/ai.json:assets" \
            src/shadow_chat.py

      #--- Create a GitHub release & upload asset -----------------------------
      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: dist-linux/shadow_chat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      #--- (Optional) also keep the artifact in the workflow UI -----------------
      - name: Upload artifact for workflow archive
        uses: actions/upload-artifact@v4
        with:
          name: shadowchat-linux
          path: dist-linux/shadow_chat