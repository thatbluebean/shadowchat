name: Build & Release

on:
  workflow_dispatch:               # manual trigger
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write              # needed for creating a release / uploading assets
    strategy:
      fail-fast: false             # If one OS fails, don't cancel the others
      matrix:
        include:
          - os: macos-latest
            name: macos
            ext: ".command"
            sep: ":"
          - os: ubuntu-latest
            name: linux
            ext: ".run"
            sep: ":"
          - os: windows-latest
            name: windows
            ext: ".exe"
            sep: ";"
    steps:
      #--- Checkout source ----------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      #--- Set up Python -------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"   # adjust to the version you need
          cache: 'pip'             # Optional: speeds up dependency installation

      #--- Install build dependencies -------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          # Critical: Install your project's dependencies
          pip install -r requirements.txt

      #--- Build the executable -------------------------------------------------
      - name: Build package
        shell: bash                # Forces bash on Windows so '\' line-breaks work
        run: |
          pyinstaller \
            --onefile \
            --paths src \
            --distpath dist-output \
            --workpath build-output \
            --add-data "assets/ai.json${{ matrix.sep }}assets" \
            --optimize 2 \
            --name shadow_chat.${{ matrix.ext }} \
            --target-architecture universal2 \
            src/shadow_chat.py

      #--- Create a GitHub release & upload asset -----------------------------
      # The softprops action is matrix-safe. The first OS to finish will create 
      # the release, and the subsequent OS jobs will append their files to it.
      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: ./CHANGELOG.md
          draft: false
          files: dist-output/shadow_chat${{ matrix.ext }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      #--- (Optional) also keep the artifact in the workflow UI -----------------
      - name: Upload artifact for workflow archive
        uses: actions/upload-artifact@v4
        with:
          name: shadowchat-${{ matrix.name }}
          path: dist-output/shadow_chat${{ matrix.ext }}
